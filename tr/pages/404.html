<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credigi - 404 Page Not Found</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* 404 Section */
        .error-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        /* Animated Background */
        .error-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(255,255,255,0.1)" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,138.7C960,139,1056,117,1152,96C1248,75,1344,53,1392,42.7L1440,32L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') no-repeat bottom;
            background-size: cover;
            animation: wave 10s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Floating Elements */
        .floating-elements {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .floating-element {
            position: absolute;
            opacity: 0.15;
            animation: float 15s ease-in-out infinite;
        }

        .floating-element:nth-child(1) {
            top: 10%;
            left: 10%;
            font-size: 60px;
            animation-delay: 0s;
        }

        .floating-element:nth-child(2) {
            top: 60%;
            left: 80%;
            font-size: 80px;
            animation-delay: 2s;
        }

        .floating-element:nth-child(3) {
            top: 80%;
            left: 20%;
            font-size: 50px;
            animation-delay: 4s;
        }

        .floating-element:nth-child(4) {
            top: 30%;
            left: 70%;
            font-size: 70px;
            animation-delay: 1s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-30px) rotate(180deg);
            }
        }

        /* Error Content */
        .error-content {
            text-align: center;
            color: white;
            z-index: 10;
            position: relative;
            max-width: 600px;
        }

        .error-code {
            font-size: 150px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 20px;
            position: relative;
            display: inline-block;
            animation: glitch 3s ease-in-out infinite;
        }

        .error-code .gradient-number {
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 2s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        @keyframes glitch {
            0%, 90%, 100% {
                transform: translate(0);
            }
            92% {
                transform: translate(-2px, 2px);
            }
            94% {
                transform: translate(2px, -2px);
            }
            96% {
                transform: translate(-2px, -2px);
            }
            98% {
                transform: translate(2px, 2px);
            }
        }

        .error-message {
            font-size: 18px;
            line-height: 1.8;
            opacity: 0.95;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 0.95;
                transform: translateY(0);
            }
        }

        /* Back to Home Button */
        .back-home-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 40px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 1s ease-out 0.6s both;
            position: relative;
            overflow: hidden;
        }

        .back-home-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(102, 126, 234, 0.2), transparent);
            transition: left 0.5s;
        }

        .back-home-btn:hover::before {
            left: 100%;
        }

        .back-home-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            background: #f8f9ff;
        }

        .back-home-btn i {
            font-size: 18px;
            transition: transform 0.3s;
        }

        .back-home-btn:hover i {
            transform: translateX(-5px);
        }

        /* Particles */
        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            animation: particle-float 8s ease-in-out infinite;
        }

        .particle:nth-child(1) {
            width: 8px;
            height: 8px;
            top: 20%;
            left: 15%;
            animation-delay: 0s;
        }

        .particle:nth-child(2) {
            width: 6px;
            height: 6px;
            top: 40%;
            left: 85%;
            animation-delay: 1s;
        }

        .particle:nth-child(3) {
            width: 10px;
            height: 10px;
            top: 70%;
            left: 25%;
            animation-delay: 2s;
        }

        .particle:nth-child(4) {
            width: 7px;
            height: 7px;
            top: 50%;
            left: 75%;
            animation-delay: 1.5s;
        }

        .particle:nth-child(5) {
            width: 9px;
            height: 9px;
            top: 80%;
            left: 60%;
            animation-delay: 2.5s;
        }

        @keyframes particle-float {
            0%, 100% {
                transform: translateY(0) translateX(0);
            }
            25% {
                transform: translateY(-20px) translateX(10px);
            }
            50% {
                transform: translateY(-40px) translateX(-10px);
            }
            75% {
                transform: translateY(-20px) translateX(10px);
            }
        }

        /* Search Icon Animation */
        .search-icon {
            font-size: 100px;
            opacity: 0.2;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.2;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.3;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .error-code {
                font-size: 100px;
            }

            .error-message {
                font-size: 16px;
                padding: 0 20px;
            }

            .back-home-btn {
                padding: 15px 30px;
                font-size: 14px;
            }

            .floating-element {
                font-size: 40px !important;
            }

            .search-icon {
                font-size: 60px;
            }
        }

        @media (max-width: 480px) {
            .error-code {
                font-size: 80px;
            }

            .error-message {
                font-size: 14px;
            }

            .floating-element {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- 404 Error Section -->
    <section class="error-section">
        <!-- Floating Elements -->
        <div class="floating-elements">
            <i class="fas fa-credit-card floating-element"></i>
            <i class="fas fa-wallet floating-element"></i>
            <i class="fas fa-coins floating-element"></i>
            <i class="fas fa-money-bill-wave floating-element"></i>
        </div>

        <!-- Particles -->
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>

        <!-- Error Content -->
        <div class="error-content">
            <div class="search-icon">
                <i class="fas fa-search"></i>
            </div>
            
            <h1 class="error-code">
                4<span class="gradient-number">04</span>
            </h1>
            
            <p class="error-message">
                Lorem ipsum dolor sit amet, consectetuer adipiscing elit. Aenean commodo ligula eget dolor. Aenean massa. Cum sociis natoque penatibus et magnis.
            </p>
            
            <a href="index.html" class="back-home-btn">
                <i class="fas fa-home"></i>
                <span>Back To Home</span>
            </a>
        </div>
    </section>

    <script>
        // Add more dynamic particles
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.width = Math.random() * 8 + 4 + 'px';
            particle.style.height = particle.style.width;
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 3 + 's';
            particle.style.animationDuration = Math.random() * 5 + 5 + 's';
            
            document.querySelector('.error-section').appendChild(particle);
        }

        // Create additional particles
        for (let i = 0; i < 10; i++) {
            createParticle();
        }

        // Mouse parallax effect
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            
            const floatingElements = document.querySelectorAll('.floating-element');
            floatingElements.forEach((element, index) => {
                const speed = (index + 1) * 0.5;
                element.style.transform = `translate(${moveX * speed}px, ${moveY * speed}px)`;
            });
        });

        // Add glitch effect randomly
        function addGlitchEffect() {
            const errorCode = document.querySelector('.error-code');
            errorCode.style.textShadow = `
                ${Math.random() * 10 - 5}px ${Math.random() * 10 - 5}px 0 rgba(255, 0, 0, 0.3),
                ${Math.random() * 10 - 5}px ${Math.random() * 10 - 5}px 0 rgba(0, 255, 0, 0.3),
                ${Math.random() * 10 - 5}px ${Math.random() * 10 - 5}px 0 rgba(0, 0, 255, 0.3)
            `;
            
            setTimeout(() => {
                errorCode.style.textShadow = 'none';
            }, 100);
        }

        // Random glitch every 3-5 seconds
        setInterval(() => {
            if (Math.random() > 0.7) {
                addGlitchEffect();
            }
        }, 3000);

        // Button hover sound effect (visual feedback)
        const backBtn = document.querySelector('.back-home-btn');
        backBtn.addEventListener('mouseenter', () => {
            backBtn.style.transform = 'translateY(-3px) scale(1.05)';
        });
        
        backBtn.addEventListener('mouseleave', () => {
            backBtn.style.transform = 'translateY(0) scale(1)';
        });

        // Add entrance animation to error code
        window.addEventListener('load', () => {
            const errorCode = document.querySelector('.error-code');
            errorCode.style.animation = 'glitch 3s ease-in-out infinite, fadeInUp 1s ease-out both';
        });
    </script>
</body>
</html>
